<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart College Companion</title>
<style>
body{
margin:0;
font-family:Segoe UI,Arial;
background:linear-gradient(135deg,#141e30,#243b55);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:10px;
color:white
}
.card{
width:95%;
max-width:520px;
max-height:95vh;
overflow:auto;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:28px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}
.fileLabel{
display:block;
text-align:center;
padding:12px;
margin-top:8px;
border-radius:999px;
background:#00d2ff;
color:black;
font-weight:bold;
cursor:pointer;
transition: transform 0.15s ease, box-shadow 0.15s ease;
-webkit-tap-highlight-color: transparent;
outline: none;
}
.fileLabel:active{
transform: scale(0.92);
box-shadow: 0 4px 10px rgba(0,0,0,0.3) inset;
-webkit-tap-highlight-color: transparent;
outline: none;
}
h2{text-align:center}
input,textarea,select{
width:100%;
height:45px;
margin:8px 0;
border:none;

border-radius:999px;

padding:0 15px;
box-sizing:border-box
}
textarea{height:70px;padding-top:10px}
button{
width:100%;
height:45px;
margin-top:8px;
border:none;
border-radius:25px;
font-weight:bold;
background:#00d2ff;
cursor:pointer;
transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
button{
transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.fileLabel, .smallBtn{
transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
button:active{
-webkit-tap-highlight-color: transparent;
outline: none;
transform: scale(0.92);
box-shadow: 0 4px 10px rgba(0,0,0,0.3) inset;
}
.smallBtn{
height:35px;
margin-top:5px;
background:#ff4b5c
}
.section{
display:none;
margin-top:15px;
padding:12px;
background:rgba(0,0,0,0.3);
border-radius:28px
}

.section.active{
display:block;
}
.historyBox{
max-height:130px;
overflow:auto;
background:rgba(255,255,255,0.1);
padding:8px;
border-radius:28px;
margin-top:6px
}
img{
width:100%;
border-radius:28px;
margin-top:6px
}
.hidden{display:none}
.logout{background:#ff4b5c;margin-top:12px}
.popup{
position:fixed;
top:20px;
right:20px;
background:#ff9800;
color:black;
padding:15px;
border-radius:28px;
display:none;
max-width:300px;
z-index:999
}
@media (max-width: 480px){

h2{
font-size:18px;
}

input, textarea, button, select{
height:40px;
font-size:14px;
}

.section{
padding:10px;
}

.historyBox{
max-height:120px;
}

}
.pillNav{
padding:10px 16px;
border:none;
border-radius:999px;
background:#00d2ff;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.pillNav:active{
transform:scale(0.9);
}
</style>
</head>
<body>

<div class="popup" id="adminPopup"></div>

<div class="card" id="loginBox">
<h2>Smart College Companion</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
<div class="card hidden" id="adminPanel">

<h2>Admin Dashboard</h2>

<div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;">
<button class="pillNav" onclick="showAdminPage('timetablePage')">Time Table</button>
<button class="pillNav" onclick="showAdminPage('attendancePage')">Attendance</button>
<button class="pillNav" onclick="showAdminPage('questionPage')">Questions</button>
<button class="pillNav" onclick="showAdminPage('divisionPage')">Students</button>
<button class="pillNav" onclick="showAdminPage('assignmentPage')">Assignments</button>
</div>


<div id="timetablePage" class="section active">
<h3>Upload Time Table</h3>
<label class="fileLabel" onclick="document.getElementById('timetableUpload').click()">Choose File</label>
<input type="file" id="timetableUpload" accept="image/*" style="display:none;">
<button onclick="addTimetable()">Add Time Table</button>
<div class="historyBox" id="adminTimetableList"></div>
</div>

<div id="attendancePage" class="section">
<h3>Attendance Management</h3>
<input type="text" id="attendanceSection" placeholder="Section (CSA)">
<input type="number" id="attendanceValue" placeholder="Attendance %">
<button onclick="saveAttendance()">Save / Update Attendance</button>
<div class="historyBox" id="adminAttendanceList"></div>
</div>

<div id="questionPage" class="section">
<h3>Student Questions</h3>
<div class="historyBox" id="adminQuestionHistory"></div>
</div>

<div id="divisionPage" class="section">
<h3>Division Student Management</h3>
<select id="divisionSelect">
<option value="OOP">OOP</option>
<option value="DS">Data Structure</option>
<option value="PY">Python</option>
</select>
<input type="text" id="studentName" placeholder="Student Name">
<input type="text" id="studentRoll" placeholder="Roll Number">
<button onclick="addStudent()">Add Student</button>
<div class="historyBox" id="adminDivisionTable"></div>
</div>

<div id="assignmentPage" class="section">
<h3>Assignments</h3>
<select id="assignDivision">
<option value="OOP">OOP</option>
<option value="DS">Data Structure</option>
<option value="PY">Python</option>
</select>
<input type="text" id="assignTitle" placeholder="Assignment Title">
<label for="assignmentFile" class="fileLabel">Choose File</label>
<input type="file" id="assignmentFile" accept=".pdf,.jpg,.png" style="display:none;">
<input type="date" id="assignDeadline">
<button onclick="addAssignment()">Create Assignment</button>
<div class="historyBox" id="adminAssignmentList"></div>
</div>

<button class="logout" onclick="logout()">Logout</button>
</div><div class="card hidden" id="studentPanel">

<h2>Student Dashboard</h2>

<!-- ðŸ”˜ Navigation -->
<div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;">
<button class="pillNav" onclick="showStudentPage('studentTT')">Time Table</button>
<button class="pillNav" onclick="showStudentPage('studentAtt')">Attendance</button>
<button class="pillNav" onclick="showStudentPage('studentQ')">Ask</button>
<button class="pillNav" onclick="showStudentPage('studentDiv')">Students</button>
<button class="pillNav" onclick="showStudentPage('studentAssign')">Assignments</button>
</div>

<!-- ðŸ“„ Pages -->

<div id="studentTT" class="section active">
<h3>All Time Tables</h3>
<div id="studentTimetableDisplay"></div>
</div>

<div id="studentAtt" class="section">
<h3>Attendance</h3>
<div id="studentAttendanceDisplay"></div>
</div>

<div id="studentQ" class="section">
<h3>Ask Admin</h3>
<textarea id="questionBox" placeholder="Type your question"></textarea>
<button onclick="sendQuestion()">Send Question</button>
<div class="historyBox" id="studentQuestionHistory"></div>
</div>

<div id="studentDiv" class="section">
<h3>Division Student Lists</h3>
<select id="studentDivisionView" onchange="loadStudentDivision()">
<option value="OOP">OOP</option>
<option value="DS">Data Structure</option>
<option value="PY">Python</option>
</select>
<div class="historyBox" id="studentDivisionTable"></div>
</div>

<div id="studentAssign" class="section">
<h3>Assignments</h3>
<select id="studentAssignDivision" onchange="loadStudentAssignments()">
<option value="OOP">OOP</option>
<option value="DS">Data Structure</option>
<option value="PY">Python</option>
</select>
<div class="historyBox" id="studentAssignmentList"></div>
</div>

<button class="logout" onclick="logout()">Logout</button>
</div><script>
function getDivisions(){
return JSON.parse(localStorage.getItem("divisions")||'{"OOP":[],"DS":[],"PY":[]}')
}
function saveDivisions(data){
localStorage.setItem("divisions",JSON.stringify(data))
}
function addStudent(){
let division=document.getElementById("divisionSelect").value
let name=document.getElementById("studentName").value
let roll=document.getElementById("studentRoll").value
if(name===""||roll==="")return
let data=getDivisions()
data[division].push({name:name,roll:roll})
saveDivisions(data)
document.getElementById("studentName").value=""
document.getElementById("studentRoll").value=""
loadAdminDivision()
}
function loadAdminDivision(){
let division=document.getElementById("divisionSelect").value
let data=getDivisions()
let box=document.getElementById("adminDivisionTable")
box.innerHTML="<div style='overflow-x:auto'><table width='100%' border='0'>"
data[division].forEach((student,index)=>{
box.innerHTML+=`
<tr>
<td>${student.name}</td>
<td>${student.roll}</td>
<td><button class="smallBtn" onclick="removeStudent('${division}',${index})">Remove</button></td>
</tr>
`
})
box.innerHTML+="</table></div>"
}
function removeStudent(division,index){
let data=getDivisions()
data[division].splice(index,1)
saveDivisions(data)
loadAdminDivision()
}
function loadStudentDivision(){
let division=document.getElementById("studentDivisionView").value
let data=getDivisions()
let box=document.getElementById("studentDivisionTable")
box.innerHTML="<div style='overflow-x:auto'><table width='100%' style='border-collapse:collapse;'>"
data[division].forEach(student=>{
box.innerHTML+=`
<tr>
<td>${student.name}</td>
<td>${student.roll}</td>
</tr>
`
})
box.innerHTML+="</table></div>"
}
let questionCount=0
let interval

function login(){
let user=document.getElementById("username").value
let pass=document.getElementById("password").value

if(user==="ADMIN" && pass==="A"){
localStorage.setItem("loggedUser","ADMIN")

document.getElementById("loginBox").classList.add("hidden")
document.getElementById("adminPanel").classList.remove("hidden")

loadAdminAttendance()
loadAdminTimetables()
loadAdminQuestions()
loadAdminAssignments()
startPopupCheck()
}
else if(user==="STUDENT" && pass==="S"){
localStorage.setItem("loggedUser","STUDENT")

document.getElementById("loginBox").classList.add("hidden")
document.getElementById("studentPanel").classList.remove("hidden")

loadStudentAttendance()
loadStudentTimetables()
loadStudentQuestions()
loadStudentAssignments()
}
else{
alert("Invalid Credentials")
}
}

function addTimetable(){
let file=document.getElementById("timetableUpload").files[0]

if(!file){
alert("Please select a file first")
return
}

if(!file.type.startsWith("image/")){
alert("Only image files allowed")
return
}

let reader=new FileReader()

reader.onload=function(){
let timetables=JSON.parse(localStorage.getItem("timetables")||"[]")
timetables.push(reader.result)
localStorage.setItem("timetables",JSON.stringify(timetables))

alert("Time Table Added")

document.getElementById("timetableUpload").value=""

loadAdminTimetables()
}

reader.readAsDataURL(file)
}
function loadAdminTimetables(){
let box=document.getElementById("adminTimetableList")
box.innerHTML=""

let timetables=JSON.parse(localStorage.getItem("timetables")||"[]")

timetables.forEach((img,index)=>{
box.innerHTML+=`
<div style="margin-bottom:10px">
<p>Time Table ${index+1}</p>
<img src="${img}" style="width:100%;border-radius:15px;">
<button class="smallBtn" onclick="removeTimetable(${index})">Remove</button>
</div>
`
})
}
function removeTimetable(index){
let timetables=JSON.parse(localStorage.getItem("timetables")||"[]")
timetables.splice(index,1)
localStorage.setItem("timetables",JSON.stringify(timetables))
loadAdminTimetables()
}
function loadStudentTimetables(){
let container=document.getElementById("studentTimetableDisplay")
container.innerHTML=""
let timetables=JSON.parse(localStorage.getItem("timetables")||"[]")
timetables.forEach(img=>{
container.innerHTML+=`<img src="${img}">`
})
}
loadAdminDivision()
document.getElementById("divisionSelect").onchange=loadAdminDivision
loadStudentDivision()

function saveAttendance(){
let section=document.getElementById("attendanceSection").value
let value=document.getElementById("attendanceValue").value
if(section===""||value==="")return
let attendance=JSON.parse(localStorage.getItem("attendance")||"{}")
attendance[section]=value
localStorage.setItem("attendance",JSON.stringify(attendance))
loadAdminAttendance()
}
function loadAdminAttendance(){
let box=document.getElementById("adminAttendanceList")
box.innerHTML=""
let attendance=JSON.parse(localStorage.getItem("attendance")||"{}")
for(let sec in attendance){
box.innerHTML+=`
<p>${sec} : ${attendance[sec]}%</p>
<button class="smallBtn" onclick="removeAttendance('${sec}')">Remove</button>
`
}
}
function removeAttendance(section){
let attendance=JSON.parse(localStorage.getItem("attendance")||"{}")
delete attendance[section]
localStorage.setItem("attendance",JSON.stringify(attendance))
loadAdminAttendance()
}
function loadStudentAttendance(){
let box=document.getElementById("studentAttendanceDisplay")
box.innerHTML=""
let attendance=JSON.parse(localStorage.getItem("attendance")||"{}")
for(let sec in attendance){
box.innerHTML+=`<p>${sec} : ${attendance[sec]}%</p>`
}
}

function sendQuestion(){
let question=document.getElementById("questionBox").value
if(question==="")return
let questions=JSON.parse(localStorage.getItem("questions")||"[]")
questions.push({ question: question, reply: "" })
localStorage.setItem("questions",JSON.stringify(questions))
document.getElementById("questionBox").value=""
loadStudentQuestions()
}
function loadStudentQuestions(){
let box=document.getElementById("studentQuestionHistory")
box.innerHTML=""

let questions=JSON.parse(localStorage.getItem("questions")||"[]")

questions.forEach(q=>{
box.innerHTML+=`
<div style="margin-bottom:10px">
<p><b>Q:</b> ${q.question}</p>
<p><b>Reply:</b> ${q.reply ? q.reply : "No reply yet"}</p>
</div>
`
})
}
function loadAdminQuestions(){
let box=document.getElementById("adminQuestionHistory")
box.innerHTML=""
let questions=JSON.parse(localStorage.getItem("questions")||"[]")
questionCount=questions.length
questions.forEach((q,index)=>{
box.innerHTML+=`
<p><b>Q:</b> ${q.question}</p>

<textarea placeholder="Type reply..." id="reply_${index}">${q.reply || ""}</textarea>

<button onclick="sendReply(${index})">Send Reply</button>
`
})
}
function startPopupCheck(){
interval=setInterval(function(){
let questions=JSON.parse(localStorage.getItem("questions")||"[]")
if(questions.length>questionCount){
let popup=document.getElementById("adminPopup")
popup.innerHTML="New Question Received"
popup.style.display="block"
setTimeout(function(){popup.style.display="none"},3000)
questionCount=questions.length
loadAdminQuestions()
}
},2000)
}
function logout(){
clearInterval(interval)
localStorage.removeItem("loggedUser")
location.reload()
}

function getAssignments(){return JSON.parse(localStorage.getItem("assignments")||"[]")}
function saveAssignments(data){localStorage.setItem("assignments",JSON.stringify(data))}
function getSubmissions(){return JSON.parse(localStorage.getItem("submissions")||"[]")}
function saveSubmissions(data){localStorage.setItem("submissions",JSON.stringify(data))}

function addAssignment(){
let title=document.getElementById("assignTitle").value
let division=document.getElementById("assignDivision").value
let deadline=document.getElementById("assignDeadline").value
let file=document.getElementById("assignmentFile").files[0]

if(title===""||deadline==="") return

let allowed=["application/pdf","image/jpeg","image/png"]

if(file && !allowed.includes(file.type)){
alert("Only PDF, JPG, PNG allowed")
return
}

let reader=new FileReader()

reader.onload=function(){
let data=getAssignments()

data.push({
id: Date.now(), 
title:title,
division:division,
deadline:deadline,
file: file ? reader.result : null,
locked:false
})

saveAssignments(data)

document.getElementById("assignTitle").value=""
document.getElementById("assignmentFile").value=""

loadAdminAssignments()
}

if(file){
reader.readAsDataURL(file)
}else{
reader.onload()
}
}
function loadAdminAssignments(){
let box=document.getElementById("adminAssignmentList")
box.innerHTML=""

let data=getAssignments()

data.forEach((a,index)=>{
box.innerHTML+=`
<p>${a.title} (${a.division}) - Due: ${a.deadline}</p>

${a.file ? `
<button class="fileLabel" onclick="viewFile('${a.file}')">
View File
</button>
` : ""}

<button class="smallBtn" onclick="toggleLock(${index})">
${a.locked ? "Unlock" : "Lock"}
</button>

<button class="smallBtn" onclick="removeAssignment(${index})">Remove</button>
`
})
}

function removeAssignment(index){
let data=getAssignments()
data.splice(index,1)
saveAssignments(data)
loadAdminAssignments()
}

function loadStudentAssignments(){
let division=document.getElementById("studentAssignDivision").value
let box=document.getElementById("studentAssignmentList")
box.innerHTML=""

let data=getAssignments()
let submissions=getSubmissions()

data.forEach((a,index)=>{
if(a.division===division){

let isLate = new Date() > new Date(a.deadline)
let submitted = submissions.find(s=>s.assignmentId===a.id)
let color = submitted ? "lightgreen" : "red"

box.innerHTML+=`
<div style="margin-bottom:10px; ${isLate?'opacity:0.5;':''}"><p style="color:${color}"><b>${a.title}</b></p>
<p>Due: ${a.deadline}</p>

${a.file ? `
<button class="fileLabel" onclick="downloadFile('${a.file}')">
Download Assignment
</button>
` : ""}

${submitted 
? "<p>Submitted</p>" 
: (a.locked 
? "<p>Submission Lockedâ€â€™</p>" 
: `
<label class="fileLabel" onclick="triggerFile(${a.id})">
Choose File
</label>
<input type="file" id="file_${a.id}" accept=".pdf,.jpg,.png" style="display:none" onchange="submitAssignment(event,${a.id})">
`)}</div>
`
}
})
}

function submitAssignment(event,index){
let file=event.target.files[0]
if(!file)return
let allowed=["application/pdf","image/jpeg","image/png"]
if(!allowed.includes(file.type)){
alert("Only PDF, JPG, PNG allowed")
return
}
let reader=new FileReader()
reader.onload=function(){
let submissions=getSubmissions()
submissions.push({
assignmentId:index,
file:reader.result,
time:new Date().toISOString()
})
saveSubmissions(submissions)
alert("Submitted successfully")
loadStudentAssignments()
}
reader.readAsDataURL(file)
}
function toggleLock(index){
let data=getAssignments()
data[index].locked = !data[index].locked
saveAssignments(data)
loadAdminAssignments()
}
window.onload = function(){
let user = localStorage.getItem("loggedUser")

if(user==="ADMIN"){
document.getElementById("loginBox").classList.add("hidden")
document.getElementById("adminPanel").classList.remove("hidden")

loadAdminAttendance()
loadAdminTimetables()
loadAdminQuestions()
loadAdminAssignments() 
startPopupCheck()
}
else if(user==="STUDENT"){
document.getElementById("loginBox").classList.add("hidden")
document.getElementById("studentPanel").classList.remove("hidden")

loadStudentAttendance()
loadStudentTimetables()
loadStudentQuestions()
loadStudentAssignments() 
}
}
document.querySelectorAll("button").forEach(btn=>{
btn.addEventListener("click", function(){
this.style.transform = "scale(0.92)";

setTimeout(()=>{
this.style.transform = "scale(1.05)";
},100);

setTimeout(()=>{
this.style.transform = "scale(1)";
},200);
});
});
function triggerFile(id){
document.getElementById("file_"+id).click()
}
function downloadFile(file){
let a = document.createElement("a")
a.href = file
a.download = "assignment"
a.click()
}
function viewFile(file){
window.open(file, "_blank")
}
function showAdminPage(pageId){
let pages = document.querySelectorAll("#adminPanel .section")
pages.forEach(p=>p.classList.remove("active"))
document.getElementById(pageId).classList.add("active")
}

function showStudentPage(pageId){
let pages = document.querySelectorAll("#studentPanel .section")
pages.forEach(p=>p.classList.remove("active"))
document.getElementById(pageId).classList.add("active")
}
</script>

</body>
</html>
